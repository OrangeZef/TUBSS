name: Container Tests
on:
  pull_request:
    paths: ['**.sh', 'test/**', '.github/workflows/test.yml']
  push:
    branches: [main]
    paths: ['**.sh', 'test/**']
  workflow_dispatch:
jobs:
  container-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            dockerfile: test/Dockerfile
            script_path: /usr/local/bin/tubss_setup.sh
          - name: ubuntu-22.04
            dockerfile: test/Dockerfile.2204
            script_path: /usr/local/bin/tubss_setup.sh
          - name: debian-12
            dockerfile: test/Dockerfile.debian12
            script_path: /root/tubss_setup.sh
          - name: debian-13
            dockerfile: test/Dockerfile.debian13
            script_path: /root/tubss_setup.sh
          - name: debian-14
            dockerfile: test/Dockerfile.debian14
            script_path: /root/tubss_setup.sh
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -f ${{ matrix.dockerfile }} -t tubss-${{ matrix.name }} .
      - name: Syntax check
        run: docker run --rm tubss-${{ matrix.name }} bash -n ${{ matrix.script_path }}
      - name: Shellcheck
        run: docker run --rm tubss-${{ matrix.name }} bash -c "command -v shellcheck && shellcheck -S warning ${{ matrix.script_path }} || echo 'shellcheck not installed, skipping'"
      - name: Help smoke
        run: docker run --rm tubss-${{ matrix.name }} bash ${{ matrix.script_path }} --help
      - name: Version smoke
        run: docker run --rm tubss-${{ matrix.name }} bash ${{ matrix.script_path }} --version
      - name: Dry-run smoke with output markers
        run: |
          out=$(docker run --rm tubss-${{ matrix.name }} bash ${{ matrix.script_path }} --unattended --dry-run 2>&1)
          echo "$out"
          # Confirm dry-run was honored (otherwise script actually mutated state)
          echo "$out" | grep -q '\[DRY-RUN\]' || { echo "::error::No [DRY-RUN] markers found"; exit 1; }
          # Core subsystems ran
          echo "$out" | grep -qE '(Installing packages|Package lists updated)' || { echo "::error::Package install step missing"; exit 1; }
          # CC-131: apt upgrade step present
          echo "$out" | grep -qE 'Applying pending package updates' || { echo "::error::apt upgrade step missing (CC-131)"; exit 1; }
          echo "$out" | grep -q 'Configuring UFW' || { echo "::error::UFW step missing"; exit 1; }
          echo "$out" | grep -q 'Configuring Fail2ban' || { echo "::error::Fail2ban step missing"; exit 1; }
          # SSH hardening default is OFF — must appear as skipped/disabled
          echo "$out" | grep -qE '(SSH hardening disabled|SKIP\].*SSH)' || { echo "::error::SSH hardening block missing"; exit 1; }
          # Clean exit marker
          echo "$out" | grep -qE 'TUBSS run ended rc=0' || { echo "::error::Missing clean-exit log marker"; exit 1; }
