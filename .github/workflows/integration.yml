name: Integration Tests
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tubss_setup.sh'
      - 'versions/**/tubss_setup.sh'
      - 'test/integration/**'
      - '.github/workflows/integration.yml'
jobs:
  integration-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            dockerfile: test/integration/Dockerfile.ubuntu-24.04
          - name: ubuntu-22.04
            dockerfile: test/integration/Dockerfile.ubuntu-22.04
          - name: debian-12
            dockerfile: test/integration/Dockerfile.debian-12
          - name: debian-13
            dockerfile: test/integration/Dockerfile.debian-13
          - name: debian-14
            dockerfile: test/integration/Dockerfile.debian-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -f ${{ matrix.dockerfile }} -t tubss-int-${{ matrix.name }} .
      - name: Start container
        run: |
          docker run -d --name tubss-${{ matrix.name }} \
            --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --tmpfs /tmp --tmpfs /run --tmpfs /run/lock \
            tubss-int-${{ matrix.name }}
          # Give systemd a moment to settle
          sleep 5
      - name: Run TUBSS (default, no SSH hardening)
        run: docker exec tubss-${{ matrix.name }} /root/run.sh default
      - name: Capture default run log
        if: always()
        run: docker exec tubss-${{ matrix.name }} cat /var/log/tubss.log || true
      - name: Clean container state for second run
        run: docker exec tubss-${{ matrix.name }} bash -c "rm -f /var/log/tubss.log /var/lib/tubss/last_run"
      - name: Run TUBSS (SSH hardening enabled)
        run: docker exec tubss-${{ matrix.name }} /root/run.sh ssh-hardened
      - name: Cleanup
        if: always()
        run: docker rm -f tubss-${{ matrix.name }} || true
