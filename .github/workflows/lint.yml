name: Lint

on:
  push:
    branches:
      - main
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: |
          find . -name '*.sh' -not -path './.git/*' | while read -r f; do
            echo "Checking syntax: $f"
            bash -n "$f"
          done

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
