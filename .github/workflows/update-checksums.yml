name: Update SHA256 Checksums

on:
  push:
    branches:
      - main
    paths:
      - '**/tubss_setup.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-checksums:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate SHA256 checksums
        run: |
          sha256sum tubss_setup.sh > tubss_setup.sha256
          (cd versions/22.04 && sha256sum tubss_setup.sh > tubss_setup.sha256)
          (cd versions/24.04 && sha256sum tubss_setup.sh > tubss_setup.sha256)
          (cd versions/debian/12 && sha256sum tubss_setup.sh > tubss_setup.sha256)
          (cd versions/debian/13 && sha256sum tubss_setup.sh > tubss_setup.sha256)
          (cd versions/debian/14 && sha256sum tubss_setup.sh > tubss_setup.sha256)

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated checksums
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "OrangeZef"
          git config user.email "OrangeZef@users.noreply.github.com"
          git add tubss_setup.sha256 versions/22.04/tubss_setup.sha256 versions/24.04/tubss_setup.sha256 versions/debian/12/tubss_setup.sha256 versions/debian/13/tubss_setup.sha256 versions/debian/14/tubss_setup.sha256
          git commit -m "ci: regenerate SHA256 checksums [skip ci]"
          git push
