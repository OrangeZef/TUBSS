name: Update SHA256 Checksums

on:
  push:
    branches:
      - main
    paths:
      - '**/tubss_setup.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-checksums:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate SHA256 checksums
        run: |
          # Root is the single source of truth (CC-103, v2.6+). versions/
          # checksums are regenerated only if the file still exists — once
          # the versions/ tree is deleted this stops touching anything.
          sha256sum tubss_setup.sh > tubss_setup.sha256
          for d in versions/22.04 versions/24.04 versions/debian/12 versions/debian/13 versions/debian/14; do
            if [ -f "$d/tubss_setup.sh" ]; then
              (cd "$d" && sha256sum tubss_setup.sh > tubss_setup.sha256)
            fi
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated checksums
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "OrangeZef"
          git config user.email "OrangeZef@users.noreply.github.com"
          # Only stage checksum files that actually exist.
          git add tubss_setup.sha256
          for d in versions/22.04 versions/24.04 versions/debian/12 versions/debian/13 versions/debian/14; do
            if [ -f "$d/tubss_setup.sha256" ]; then
              git add "$d/tubss_setup.sha256"
            fi
          done
          git commit -m "ci: regenerate SHA256 checksums [skip ci]"
          git push
